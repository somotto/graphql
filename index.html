<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphQL Profile Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h1 class="login-title">GraphQL Profile</h1>
            <div id="errorMessage" class="error-message hidden"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username or Email</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="loginText">Sign In</span>
                    <span id="loginSpinner" class="loading hidden"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard container">
        <header class="header">
            <div class="user-info">
                <h1 id="userName">Welcome back!</h1>
                <p id="userDetails">Loading your profile...</p>
            </div>
            <button class="btn btn-secondary" id="logoutBtn">Logout</button>
        </header>

        <!-- Stats Grid -->
        <div class="grid">
            <div class="card stat-card">
                <div class="stat-number" id="totalXP">0</div>
                <div class="stat-label">Total XP</div>
            </div>
            <div class="card stat-card">
                <div class="stat-number" id="projectsCount">0</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="card stat-card">
                <div class="stat-number" id="auditRatio">0%</div>
                <div class="stat-label">Audit Ratio</div>
            </div>
            <div class="card stat-card">
                <div class="stat-number" id="passRate">0%</div>
                <div class="stat-label">Pass Rate</div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="chart-container">
            <div class="chart-grid">
                <div class="card chart-card">
                    <h3 class="chart-title">XP Progress Over Time</h3>
                    <svg id="xpChart" viewBox="0 0 600 300">
                        <!-- XP Progress Chart will be generated here -->
                    </svg>
                </div>
                <div class="card chart-card">
                    <h3 class="chart-title">Project Success Rate</h3>
                    <svg id="successChart" viewBox="0 0 400 400">
                        <!-- Success Rate Pie Chart will be generated here -->
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
